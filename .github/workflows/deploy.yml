name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing repository secret NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "$SUPABASE_KEY" ] && [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing repository secret NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (or NEXT_PUBLIC_SUPABASE_ANON_KEY)"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Add secrets at: https://github.com/brovaset/Slack-Clone/settings/secrets/actions"
            echo "Use Repository secrets (not Environment or Dependabot). Names must match exactly."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          test -f out/index.html || (echo "::error::out/index.html missing — build failed" && exit 1)
          grep -q "__next" out/index.html || (echo "::error::out/index.html is not the Next.js app" && exit 1)
          if ! grep -rqE 'url:"https://[a-z0-9]+\.supabase\.co"' out/_next/static/chunks/; then
            echo "::error::Supabase project URL not embedded in client bundle. Check repository secrets and redeploy."
            exit 1
          fi
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
